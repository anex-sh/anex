apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: wg-al2023
spec:
  amiSelectorTerms:
    - alias: al2023@v20250610
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "eks-clusters"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "eks-cluster-rex-dev"
  role: "KarpenterNodeRole-rex-dev--eks-cluster"
  tags:
    ManagedBy: Skarupa
  detailedMonitoring: false
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: wg-pool
spec:
  template:
    metadata:
      labels:
        wg/node: "true"
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: wg-al2023
      taints:
        - key: wg/only
          value: "true"
          effect: NoSchedule
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
  limits:
    cpu: "2"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
