apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wireguard-proxy
  template:
    metadata:
      labels:
        app: wireguard-proxy
    spec:
      nodeSelector:
        wg/node: "true"
      tolerations:
        - key: "wg/only"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: wg
          image: ubuntu:24.04
          command: ["sleep", "36000"]
          ports:
            - name: wg
              containerPort: 51820
              protocol: UDP
            - name: hc
              containerPort: 9000
              protocol: TCP
          securityContext:
            # allowPrivilegeEscalation: false
            # runAsNonRoot: true
            capabilities:
              # drop: ["ALL"]
              add: ["NET_ADMIN"] # kernel WG + iptables/nft configuration
