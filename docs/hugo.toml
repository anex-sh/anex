baseURL = "/"
title = "GPU Provider Documentation"

# Language settings
contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableGitInfo = true

# Docsy theme - using local path
theme = ["docsy"]

[module]
  proxy = "direct"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false

# Markdown engine
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "tango"

# Site params
[params]
  copyright = "GPU Provider Project"
  
  # Repository configuration
  github_repo = "https://gitlab.devklarka.cz/ai/gpu-provider"
  github_branch = "main"
  
  # Disable offline search and Font Awesome
  offlineSearch = false
  
  # UI configuration
  [params.ui]
    sidebar_menu_compact = false
    breadcrumb_disable = false
    sidebar_search_disable = false
    navbar_logo = true
    footer_about_enable = true
    
  [params.ui.feedback]
    enable = false
    
  [params.ui.readingtime]
    enable = false

# Menu configuration
[[menu.main]]
  name = "Documentation"
  weight = 10
  url = "/docs/"

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "monthly"
  priority = 0.5
