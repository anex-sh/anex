name: CI

on:
  pull_request:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

env:
  GO_VERSION: '1.24'
  REGISTRY: public.ecr.aws/m4v1f8q5/gpu-provider
  AWS_REGION: us-east-1
  GOOS: linux
  GOARCH: amd64
  CGO_ENABLED: '0'

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ env.GOOS }}-${{ env.GOARCH }}-cgo${{ env.CGO_ENABLED }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GOOS }}-${{ env.GOARCH }}-cgo${{ env.CGO_ENABLED }}-
      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files not properly formatted:"
            echo "$out"
            exit 1
          fi
          echo "Files are properly formatted"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ env.GOOS }}-${{ env.GOARCH }}-cgo${{ env.CGO_ENABLED }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GOOS }}-${{ env.GOARCH }}-cgo${{ env.CGO_ENABLED }}-
      - name: unit tests (placeholder)
        run: go test -timeout 120s ./cloudprovider/vastai/...

  build:
    runs-on: ubuntu-latest
    needs: [fmt, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ env.GOOS }}-${{ env.GOARCH }}-cgo${{ env.CGO_ENABLED }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ env.GOOS }}-${{ env.GOARCH }}-cgo${{ env.CGO_ENABLED }}-
      - name: Resolve VERSION
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi
      - name: make build
        run: make build VERSION=${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 14

  docker-build:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: bin/
      - run: chmod +x bin/*
      - uses: docker/setup-buildx-action@v3
      - name: Build virtual-kubelet image
        run: docker build -f deploy/Dockerfile -t virtual-kubelet:latest .
      - name: Build gateway image
        run: docker build -f deploy/gateway.Dockerfile -t gateway:latest .
      - name: Save images
        run: docker save virtual-kubelet:latest gateway:latest -o images.tar
      - uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images.tar
          retention-days: 14

  # integration-test:
  #   runs-on: ubuntu-latest
  #   needs: [docker-build]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/download-artifact@v4
  #       with:
  #         name: docker-images
  #     - run: docker load -i images.tar
  #     - uses: helm/kind-action@v1
  #       with:
  #         config: test/kind-config.yaml
  #         cluster_name: local
  #     - run: |
  #         kind load docker-image virtual-kubelet:latest --name local
  #         kind load docker-image gateway:latest --name local
  #     - run: make test-integration

  docker-push:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: docker-images
      - run: docker load -i images.tar
      - name: Resolve VERSION
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: ECR public login
        run: aws ecr-public get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin public.ecr.aws
      - name: Tag and push
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          docker tag virtual-kubelet:latest ${REGISTRY}/virtual-kubelet:${VERSION}
          docker tag gateway:latest         ${REGISTRY}/gateway:${VERSION}
          docker push ${REGISTRY}/virtual-kubelet:${VERSION}
          docker push ${REGISTRY}/gateway:${VERSION}

  helm-release:
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Resolve VERSION
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Helm OCI login
        run: aws ecr-public get-login-password --region ${{ env.AWS_REGION }} | helm registry login --username AWS --password-stdin public.ecr.aws
      - name: Package and push chart
        run: make helm-release VERSION=${{ steps.ver.outputs.version }}
