apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "chart.fullname" . }}-virtual-kubelet"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ include "chart.fullname" . }}-virtual-kubelet"
  template:
    metadata:
      labels:
        app: "{{ include "chart.fullname" . }}-virtual-kubelet"
    spec:

      affinity: {{ toYaml .Values.virtualKubelet.affinity | nindent 8 }}
      containers:
        - name: virtual-kubelet
          image: {{ .Values.virtualKubelet.image.repository }}:{{ .Values.virtualKubelet.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.virtualKubelet.image.pullPolicy }}
          # command: ['sleep', '3600']
          args:
            - --provider-config=/virtual-kubelet-config.yaml
          env:
            {{- if .Values.proxy.enable }}
            - name: PROXY_CONFIG_PATH
              value: "/proxy-config.yaml"
            {{- end }}
            - name: VKUBELET_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: BANS_OVERWRITE
              value: '{"23779":"2025-11-04T10:45:36.205086888+01:00","34425":"2025-11-04T10:45:36.205086888+01:00"}'
          volumeMounts:
            - name: vk-config
              mountPath: /virtual-kubelet-config.yaml
              subPath: virtual-kubelet-config.yaml
              readOnly: true
          {{- if .Values.proxy.enable }}
            - name: proxy-config
              mountPath: /proxy-config.yaml
              subPath: proxy-config.yaml
              readOnly: true
          {{- end }}
      volumes:
        - name: vk-config
          configMap:
            name: "{{ include "chart.fullname" . }}-virtual-kubelet-config"
        {{- if .Values.proxy.enable }}
        - name: proxy-config
          secret:
            secretName: glami-provider-proxy-config
        {{- end }}
      serviceAccountName: "{{ include "chart.fullname" . }}"
