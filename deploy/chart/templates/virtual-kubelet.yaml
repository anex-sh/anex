apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ include "chart.fullname" . }}-virtual-kubelet"
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "{{ include "chart.fullname" . }}-virtual-kubelet"
  template:
    metadata:
      labels:
        app: "{{ include "chart.fullname" . }}-virtual-kubelet"
    spec:
      {{- if .Values.virtualKubelet.affinity }}
      affinity:
        {{- toYaml .Values.virtualKubelet.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.virtualKubelet.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.virtualKubelet.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml .Values.gateway.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: virtual-kubelet
          image: {{ .Values.virtualKubelet.image.repository }}:{{ .Values.virtualKubelet.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.virtualKubelet.image.pullPolicy }}
          # command: ['sleep', '3600']
          args:
            - --provider-config=/virtual-kubelet-config.yaml
          {{- if .Values.virtualKubelet.resources }}
          resources:
            {{- toYaml .Values.virtualKubelet.resources | nindent 12 }}
          {{- end }}
          env:
            - name: VIRTUAL_NODE_PODS
              value: "100"
            {{- if .Values.gateway.enable }}
            - name: PROXY_CONFIG_PATH
              value: "/proxy-config.yaml"
            {{- end }}
            {{- if .Values.gateway.enable }}
            - name: PROXY_ENABLE
              value: "true"
            {{- end }}
            - name: VKUBELET_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: BANS_OVERWRITE
              value: '{"23779":"2025-11-04T10:45:36.205086888+01:00","34425":"2025-11-04T10:45:36.205086888+01:00"}'
          volumeMounts:
            - name: vk-config
              mountPath: /virtual-kubelet-config.yaml
              subPath: virtual-kubelet-config.yaml
              readOnly: true
          {{- if .Values.gateway.enable }}
            - name: proxy-config
              mountPath: /proxy-config.yaml
              subPath: proxy-config.yaml
              readOnly: true
          {{- end }}
      volumes:
        - name: vk-config
          configMap:
            name: "{{ include "chart.fullname" . }}-virtual-kubelet-config"
        {{- if .Values.gateway.enable }}
        - name: proxy-config
          secret:
            secretName: {{ .Values.gateway.wgSecretName }}
        {{- end }}
      serviceAccountName: "{{ include "chart.fullname" . }}"
