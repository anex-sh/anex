apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ include "chart.fullname" . }}-virtual-kubelet-config"
  namespace: {{ .Release.Namespace }}
data:
  virtual-kubelet-config.yaml: |
    {{- toYaml .Values.appConfig | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wg-dns-corefile
data:
  Corefile: |
    .:53 {
      errors
      log
      cache 30
      forward . 10.100.0.10
    }
