apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "{{ include "chart.fullname" . }}-virtual-kubelet"
rules:
  # Register the virtual node + update its status
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get","list","watch","create","update","patch"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["update","patch"]

  # Heartbeats (node leases live in kube-node-lease)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get","list","watch","create","update","patch"]

  # Observe pods scheduled to this node and update their status
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get","list","watch","update","patch","delete","create"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["update","patch"]

  # Watch Services for port-forward/exec routing and other integrations
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get","list","watch"]

  # Optional but common: logs & events
  - apiGroups: [""]
    resources: ["pods/log","events"]
    verbs: ["get","create","patch","update"]

  - apiGroups: [""]
    resources: ["secrets","serviceaccounts"]
    verbs: ["get","list","watch"]

  # Allow init container to create/update ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get","list","watch","create","update","patch"]

  # Allow init container to get Deployment for OwnerReference
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get","list"]

  # Gateway Controller: VirtualService CRD
  - apiGroups: ["anex.sh"]
    resources: ["virtualservices"]
    verbs: ["get","list","watch","update","patch"]
  - apiGroups: ["anex.sh"]
    resources: ["virtualservices/status"]
    verbs: ["update","patch"]

  # Gateway Controller: Service management
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get","list","watch","create","update","patch","delete"]

  # Gateway Controller: EndpointSlice management
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get","list","watch","create","update","patch","delete"]
