{{- if .Values.deployment.gateway.enable }}
apiVersion: v1
kind: Service
metadata:
  name: "{{ include "chart.fullname" . }}-gateway"
  namespace: {{ .Release.Namespace }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "TCP"
    {{- if .Values.deployment.gateway.AWSLoadBalancerController }}
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "9000"
    {{- else }}
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "{{ .Values.deployment.gateway.nodePort }}"
    {{- end }}
    service.beta.kubernetes.io/aws-load-balancer-ip-address-type: "ipv4"
    {{- if .Values.deployment.gateway.domain }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.deployment.gateway.domain }}
    {{- end }}
spec:
  type: LoadBalancer
  {{- if .Values.deployment.gateway.AWSLoadBalancerController }}
  loadBalancerClass: service.k8s.aws/nlb
  allocateLoadBalancerNodePorts: false
  externalTrafficPolicy: Cluster
  {{- end }}
  selector:
    app: "{{ include "chart.fullname" . }}"
  ports:
    - name: wg
      port: 51820
      targetPort: 51820
      protocol: UDP
    {{- if .Values.deployment.gateway.AWSLoadBalancerController }}
    - name: hc
      port: 9000
      targetPort: 9000
      protocol: TCP
    {{- end }}
{{- end }}
