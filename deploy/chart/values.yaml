# Application configuration
appConfig:
  logLevel: "info"

  cluster:
    clusterUUID: ""

  cloudProvider:
    mock: false
    vastAI:
      apiKey: ""

  virtualNode:
    nodeName: "virtual-node"
    podLimit: "10"
    cpu: "1000"
    memory: "1000Gi"
    labels: {}
    taints: []

  provisioning:
    maxRetries: 10
    startupTimeout: "10m"
    statusReportTimeout: "2m"
    machineBansStore:
      localFile:
        enable: true
        timeout: "1d"

  gateway:
    configPath: /gateway/config.yaml
    config: {}  # If set, mounted as secret; init container skipped

  promtail:
    enable: false
    clients: []

  tls:
    certPath: ""
    keyPath: ""
    caCertPath: ""
