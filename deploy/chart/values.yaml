# TBA: For now just true

deployment:
  affinity: {}
  nodeSelector: {}
  tolerations: []

  serviceAccount:
    annotations: {}

  gateway:
    enable: true
    AWSLoadBalancerController: false
    domain: ""

  containers:
    virtualKubelet:
      image:
        repository: "391135486350.dkr.ecr.eu-central-1.amazonaws.com/gpu-provider"
        tag: latest
        pullPolicy: Always

      resources:
        requests:
          cpu: "1"
          memory: "1Gi"
        limits:
          cpu: "1"
          memory: "1Gi"

    gateway:
      image:
        repository: "391135486350.dkr.ecr.eu-central-1.amazonaws.com/gpu-provider"
        tag: "gateway"
        pullPolicy: Always

      resources:
        requests:
          cpu: "0.5"
          memory: "512Mi"
        limits:
          cpu: "0.5"
          memory: "512Mi"


# Application configuration
appConfig:
  logLevel: "info"

  cluster:
    clusterUUID: ""

  cloudProvider:
    vastAI:
      apiKey: ""

  virtualNode:
    nodeName: "virtual-node"
    podLimit: "10"
    cpu: "1000"
    memory: "1000Gi"
    labels: {}
    taints: []

  provisioning:
    maxRetries: 10
    startupTimeout: "10m"
    statusReportTimeout: "2m"
    machineBansStore:
      localFile:
        enable: true
        timeout: "1d"

  gateway:
    configPath: /gateway/config.yaml

  promtail:
    enable: false
    clients: []
