# TBA: For now just true

deployment:
  affinity: {}
  nodeSelector: {}
  tolerations: []

  serviceAccount:
    annotations: {}

  gateway:
    class: "" # enum: [node-port | aws-eks]
    domain: ""
    nodePort: 31000

  containers:
    virtualKubelet:
      image:
        repository: "public.ecr.aws/m4v1f8q5/gpu-provider/virtual-kubelet"
        tag: "v0.3.1"
        pullPolicy: Always

      resources:
        requests:
          cpu: "0.5"
          memory: "512Mi"
        limits:
          cpu: "0.5"
          memory: "512Mi"

    gateway:
      image:
        repository: "public.ecr.aws/m4v1f8q5/gpu-provider/gateway"
        # tag: "v0.3.1"
        tag: "gateway-exp"
        pullPolicy: Always

      # TODO: Remove requirements
      resources:
        requests:
          cpu: "0.5"
          memory: "256Mi"
        limits:
          cpu: "0.5"
          memory: "256Mi"

    gatewayController:
      resources:
        requests:
          cpu: "0.5"
          memory: "256Mi"
        limits:
          cpu: "0.5"
          memory: "256Mi"


# Application configuration
appConfig:
  logLevel: "info"

  cluster:
    clusterUUID: ""

  cloudProvider:
    vastAI:
      apiKey: ""

  virtualNode:
    nodeName: "virtual-node"
    podLimit: "10"
    cpu: "1000"
    memory: "1000Gi"
    labels: {}
    taints: []

  provisioning:
    maxRetries: 10
    startupTimeout: "10m"
    statusReportTimeout: "2m"
    machineBansStore:
      localFile:
        enable: true
        timeout: "1d"

  gateway:
    configPath: /gateway/config.yaml

  promtail:
    enable: false
    clients: []
