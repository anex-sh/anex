deployment:
  affinity: {}
  nodeSelector: {}
  tolerations: []

  serviceAccount:
    annotations: {}

  tls:
    cert: ""
    key: ""
    caCert: ""

  gateway:
    class: "" # enum: [node-port | aws-eks]
    domain: ""
    nodePortUDP: 31000
    nodePortTCP: 31001
    config:
      # Name of a pre-existing Secret in the release namespace holding the
      # gateway wireguard config under key "config.yaml". If empty,
      # gateway-init generates fresh keys into an emptyDir on pod start.
      secretName: ""

  containers:
    virtualKubelet:
      enabled: true
      image:
        repository: "public.ecr.aws/m4v1f8q5/gpu-provider/virtual-kubelet"
        tag: ""
        pullPolicy: Always

      resources: {}
#        requests:
#          cpu: "0.5"
#          memory: "512Mi"
#        limits:
#          cpu: "0.5"
#          memory: "512Mi"

    gateway:
      image:
        repository: "public.ecr.aws/m4v1f8q5/gpu-provider/gateway"
        tag: ""
        pullPolicy: Always

      # TODO: Remove requirements
      resources: {}
#        requests:
#          cpu: "0.5"
#          memory: "256Mi"
#        limits:
#          cpu: "0.5"
#          memory: "256Mi"

    gatewayController: {}
#      resources:
#        requests:
#          cpu: "0.5"
#          memory: "256Mi"
#        limits:
#          cpu: "0.5"
#          memory: "256Mi"


# Application configuration
appConfig:
  logLevel: "info"

  cluster:
    clusterUUID: ""

  cdn:
    agentURL: ""
    wireproxyURL: ""
    promtailURL: ""
    anexAuthToken: ""

  cloudProvider:
    vastAI:
      apiKey: ""

  virtualNode:
    nodeName: "virtual-node"
    podLimit: "10"
    cpu: "1000"
    memory: "1000Gi"
    labels: {}
    taints: []

  provisioning:
    maxRetries: 10
    startupTimeout: "10m"
    statusReportTimeout: "2m"
    machineBansStore:
      localFile:
        enable: true
        timeout: "1d"

  gateway:
    configPath: /gateway/config.yaml

  promtail:
    enable: false
    clients: []

  tls:
    certPath: ""
    keyPath: ""
    caCertPath: ""
