# Application configuration
appConfig:
  logLevel: "info"

  cluster:
    clusterUUID: ""

  cloudProvider:
    mock: false
    vastAI:
      apiKey: ""

  virtualNode:
    nodeName: "virtual-node"
    podLimit: "10"
    cpu: "1000"
    memory: "1000Gi"
    labels: {}
    taints: []

  provisioning:
    maxRetries: 10
    startupTimeout: "10m"
    statusReportTimeout: "2m"
    machineBansStore:
      localFile:
        enable: true
        timeout: "1d"

  gateway:
    configPath: /gateway/config.yaml

  promtail:
    enable: false
    clients: []

  # TLS configuration
  # - cert, key, caCert should be base64-encoded data (no line breaks)
  # - If all three are provided, a Secret named "<release>-tls" will be created automatically
  # - The paths below are used by the Virtual Kubelet and should match the mount location
  tls:
    certPath: "/etc/kubelet-tls/tls.crt"
    keyPath: "/etc/kubelet-tls/tls.key"
    caCertPath: "/etc/kubelet-tls/ca.crt"
